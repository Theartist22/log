<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
  <title>Instagram</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #000000;
      --text: #ffffff;
      --muted: #a8a8a8;
      --field-bg: #121212;
      --field-border: #363636;
      --field-border-focus: #a8a8a8;
      --field-text: #ffffff;
      --placeholder: #737373;
      --btn-blue: #0095f6;
      --btn-blue-dim: #0074cc;
      --outline-blue: #0095f6;
      --divider: #262626;
      --separator-text: #a8a8a8;
    }

    html {
      height: 100%;
      overflow: hidden;
    }

    body {
      width: 100%;
      height: 100%;
      height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      touch-action: manipulation;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── TOP ZONE ── */
    .main-content {
      flex: 1;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 22px;
      overflow: hidden;
      min-height: 0;
    }

    /* ── LANG ── */
    .lang-label {
      width: 100%;
      text-align: center;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      padding-top: 20px;
      letter-spacing: 0.01em;
      flex-shrink: 0;
    }

    /* ── APP LOGO ── */
    .logo-wrap {
      margin: 20px auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      flex-shrink: 0;
    }

    .logo-img {
      width: 114px;
      height: 114px;
      object-fit: contain;
      border-radius: 28px;
      display: block;
      margin: 0 auto;
    }

    /* ── FORM ── */
    .form-wrap {
      width: 100%;
      flex-shrink: 0;
    }

    .field {
      width: 100%;
      margin-bottom: 10px;
      position: relative;
    }

    /* Input fields — full width, height 50px, radius 14px */
    .field input {
      width: 100%;
      height: 50px;
      background: var(--field-bg);
      border: 1px solid var(--field-border);
      border-radius: 14px;
      color: var(--field-text);
      font-size: 16px;
      font-weight: 400;
      padding: 0 48px 0 16px;
      outline: none;
      transition: border-color 0.15s ease;
      font-family: inherit;
      letter-spacing: 0.01em;
    }

    .field input::placeholder {
      color: var(--placeholder);
      font-size: 14px;
    }

    .field input:focus {
      border-color: var(--field-border-focus);
    }

    /* Eye icon — hidden until user types */
    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      padding: 4px;
      cursor: pointer;
      color: var(--muted);
      display: none;
      align-items: center;
      justify-content: center;
      transition: color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .toggle-pw:hover { color: var(--text); }

    .toggle-pw svg {
      width: 20px;
      height: 20px;
      display: block;
      pointer-events: none;
    }

    /* ── LOGIN BUTTON ──
       Same width as fields, shorter height, pill curve, slim font */
    .btn-login {
      width: 100%;
      height: 38px;
      margin-top: 10px;
      border: none;
      border-radius: 999px;
      background: var(--btn-blue);
      color: #ffffff;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease, opacity 0.15s ease;
      letter-spacing: 0.02em;
      flex-shrink: 0;
      display: block;
    }

    .btn-login:hover  { background: var(--btn-blue-dim); }
    .btn-login:active { opacity: 0.85; }

    /* ── FORGOT ── */
    .forgot {
      display: block;
      text-align: center;
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      margin-top: 18px;
      text-decoration: none;
      letter-spacing: 0.01em;
      flex-shrink: 0;
      cursor: pointer;
    }

    /* ── OR ROW ── */
    .or-row {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      margin: 20px 0 16px;
      flex-shrink: 0;
    }

    .or-line { flex: 1; height: 1px; background: var(--divider); }

    .or-text {
      font-size: 13px;
      font-weight: 600;
      color: var(--separator-text);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    /* ── FACEBOOK ── */
    .btn-fb {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      width: 100%;
      height: 40px;
      background: none;
      border: none;
      color: #4a8ff7;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.01em;
      flex-shrink: 0;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    .fb-icon { width: 18px; height: 18px; flex-shrink: 0; }

    /* ── BOTTOM ZONE: pinned ── */
    .bottom-zone {
      flex: 0 0 auto;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 22px 24px;
    }

    .bottom-divider {
      width: 100%;
      height: 1px;
      background: var(--divider);
      margin-bottom: 18px;
    }

    .btn-create {
      width: 100%;
      height: 48px;
      border-radius: 14px;
      border: 1.5px solid var(--outline-blue);
      background: transparent;
      color: var(--outline-blue);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.01em;
      transition: background 0.15s ease;
      margin-bottom: 18px;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-create:hover { background: rgba(0, 149, 246, 0.08); }

    /* ── COMPANY LOGO (bottom) ── */
    .company-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .company-brand img {
      height: 44px;
      width: auto;
      max-width: 160px;
      object-fit: contain;
      opacity: 1;
      display: block;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .lang-label  { animation: fadeUp 0.4s ease both 0.05s; }
    .logo-wrap   { animation: fadeUp 0.4s ease both 0.12s; }
    .form-wrap   { animation: fadeUp 0.4s ease both 0.20s; }
    .btn-login   { animation: fadeUp 0.4s ease both 0.26s; }
    .forgot      { animation: fadeUp 0.4s ease both 0.30s; }
    .or-row      { animation: fadeUp 0.4s ease both 0.34s; }
    .btn-fb      { animation: fadeUp 0.4s ease both 0.38s; }
    .bottom-zone { animation: fadeUp 0.4s ease both 0.42s; }
  </style>
</head>
<body>

  <!-- ── TOP ZONE ── -->
  <div class="main-content">

    <div class="lang-label">English (US)</div>

    <div class="logo-wrap">
      <img
        class="logo-img"
        src="https://tse1.mm.bing.net/th/id/OIP.Vo2KVgftA_EUBc3iD6XCngAAAA?pid=Api&P=0&h=180"
        alt="App logo"
      />
    </div>

    <form class="form-wrap" id="loginForm" method="post" action="">

      <div class="field">
        <input
          id="username"
          type="text"
          name="username"
          placeholder="Phone number, username or email"
          autocomplete="username"
          required
        />
      </div>

      <div class="field">
        <input
          id="password"
          type="password"
          name="password"
          placeholder="Password"
          autocomplete="current-password"
          required
        />
        <!-- Eye icon: appears only when user types -->
        <button type="button" class="toggle-pw" id="eyeBtn" aria-label="Toggle password visibility">
          <svg id="eyeOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg id="eyeClosed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
            <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>

      <button
        class="btn-login"
        type="button"
        data-href="https://www.instagram.com/"
      >Log in</button>

    </form>

    <a class="forgot" href="https://www.instagram.com/accounts/password/reset/">Forgot password?</a>

    <div class="or-row">
      <div class="or-line"></div>
      <span class="or-text">OR</span>
      <div class="or-line"></div>
    </div>

    <a class="btn-fb" href="https://www.facebook.com/login.php">
      <svg class="fb-icon" viewBox="0 0 24 24" fill="#4a8ff7" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.235 2.686.235v2.97h-1.513c-1.491 0-1.956.93-1.956 1.887v2.268h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
      </svg>
      Log in with Facebook
    </a>

  </div>

  <!-- ── BOTTOM ZONE: pinned ── -->
  <div class="bottom-zone">
    <div class="bottom-divider"></div>

    <a class="btn-create" href="https://www.instagram.com/accounts/emailsignup/">Create new account</a>

    <div class="company-brand">
      <img
        src="https://tse1.mm.bing.net/th/id/OIP.LckVZzlV9jO6O53Ewhy9CAHaGB?pid=Api&rs=1&c=1&qlt=95&w=119&h=97"
        alt="Company logo"
      />
    </div>

  </div>

  <script>
    // Block pinch zoom
    document.addEventListener('touchmove', function(e) {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });
    document.addEventListener('gesturestart', function(e) {
      e.preventDefault();
    });

    // Eye icon — show only when password field has a value
    const pwInput   = document.getElementById('password');
    const eyeBtn    = document.getElementById('eyeBtn');
    const eyeOpen   = document.getElementById('eyeOpen');
    const eyeClosed = document.getElementById('eyeClosed');

    pwInput.addEventListener('input', function() {
      eyeBtn.style.display = this.value.length > 0 ? 'flex' : 'none';
    });

    eyeBtn.addEventListener('click', function() {
      const isHidden          = pwInput.type === 'password';
      pwInput.type            = isHidden ? 'text'  : 'password';
      eyeOpen.style.display   = isHidden ? 'none'  : 'block';
      eyeClosed.style.display = isHidden ? 'block' : 'none';
    });

    // Log in button navigation
    document.querySelector('.btn-login').addEventListener('click', function() {
      const url = this.getAttribute('data-href');
      if (url) window.location.href = url;
    });
  </script>

</body>
</html>
